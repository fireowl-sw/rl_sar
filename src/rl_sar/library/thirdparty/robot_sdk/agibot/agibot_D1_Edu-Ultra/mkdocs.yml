# mkdocs.yml
# 仓库链接（显示在右上角）
site_name: Dog SDK Documentation
site_url: https://github.com/AgibotTech/agibot_D1_Edu-Ultra.git
repo_url: https://github.com/AgibotTech/agibot_D1_Edu-Ultra.git
repo_name: github-AgibotTech
# edit_uri: edit/main/docs/

# 在这里配置 mkdocs-material 主题
theme:
  name: material
  # language: zh
  custom_dir: docs/overrides

  # 调色板配置
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode

  # 启用主题功能
  features:
    - navigation.top      #返回顶部按钮
    - navigation.tabs
    - navigation.tabs.sticky    # 让 tabs 固定，不随滚动隐藏
    - navigation.top.sticky     # 让顶部导航栏固定，不随滚动隐藏
    - navigation.sections
    - navigation.expand
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
       # 搜索功能
    - search.suggest            # 搜索建议
    - search.highlight          # 搜索结果高亮
    - search.share              # 分享搜索链接
  
    # 内容功能
    - content.code.copy         # 代码复制按钮
    - content.code.annotate     # 代码注释
    - content.tabs.linked       # 链接的代码选项卡
  
    # 其他功能
    - toc.follow                # 目录跟随
    - toc.integrate             # 集成目录
  # 字体配置
  font:
    text: Roboto
    code: Roboto Mono

  # 图标配置
  icon:
    repo: fontawesome/brands/github
    logo: material/github

# 自定义目录
extra_css:
  - styles/extra.css

# 社交链接
# extra:
#   social:
#     - icon: fontawesome/brands/github
#       link: https://github.com/your-username/your-repo-name
#     - icon: fontawesome/brands/twitter
#       link: https://twitter.com/your-handle

# 分析统计（可选）
extra:
  analytics:
    provider: google
    property: YOUR-GA-ID
  
  alternate:
    - name: 中文
      link: "javascript:translate.changeLanguage('chinese_simplified');"
      lang: zh
    - name: English
      link: "javascript:translate.changeLanguage('english');"
      lang: en
    - name: 한국어
      link: "javascript:translate.changeLanguage('korean');"
      lang: ko
    - name: 日本語
      link: "javascript:translate.changeLanguage('japanese');"
      lang: ja



# 版权信息
copyright: Copyright &2023-2024 Shanghai Agibot Innovation Technology Co.,Ltd.All rights reserved.

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed
  - pymdownx.highlight:  # 注意这里的冒号，表示下面是它的子配置
      linenums: true        # 子项：缩进一层（通常2或4个空格）
      linenums_style: "table"  # 同样缩进一层
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.tasklist
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: python/name:pymdownx.superfences.fence_code_format


# 插件
plugins:
  - search
  - i18n:
      # default_language: zh  # 默认显示中文
      languages:
        - locale: zh  # 中文配置
          name: 中文
          build: true  # 启用中文文档构建
          default: true
        - locale: en # 英文配置
          name: English
          build: true  # 启用英文文档构建
          default: false
        - locale: ja # 日语配置
          name: 日本語
          build: true  # 启用日语文档构建
          default: false
        - locale: ko # 韩语配置
          name: 한국어
          build: true  # 启用韩语文档构建
          default: false

      # 可选：设置语言切换链接的前缀（默认是语言代码，如 /zh/、/en/）
      default_language_only: true  # 不隐藏默认语言的 URL 前缀




